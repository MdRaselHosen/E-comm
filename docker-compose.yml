version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ecom-postgres-db
    restart: always
    environment:
      POSTGRES_DB: ecomm
      POSTGRES_USER: raselhosen
      POSTGRES_PASSWORD: "0000"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecom-django-backend
    restart: always
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - /app/ecomm-env
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=ecomm
      - DB_USER=raselhosen
      - DB_PASSWORD=0000
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecom-react-frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_BACKEND_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
